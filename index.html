<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="60">
<title>Field Day Tracker — Live</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: #1e3a5f; color: #fff;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .card {
    text-align: center; padding: 48px 32px;
    background: rgba(255,255,255,.08);
    border-radius: 16px; max-width: 460px;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .icon { font-size: 4rem; line-height: 1; }
  h1 { font-size: 1.9rem; margin: 16px 0 8px; font-weight: 700; }
  .sub { color: #7a9fc0; font-size: .9rem; margin-bottom: 20px; }
  p { color: #aac4e0; line-height: 1.7; font-size: .95rem; }
  .badge {
    display: inline-block; background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    padding: 5px 16px; border-radius: 20px;
    font-size: .8rem; margin-top: 28px; color: #aac4e0;
  }
  .url {
    margin-top: 28px; padding: 12px 16px;
    background: rgba(0,0,0,.2); border-radius: 8px;
    font-family: monospace; font-size: .85rem; color: #7fc7ff;
    word-break: break-all;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📻</div>
  <h1>N1MM Field Day Tracker</h1>
  <div class="sub">ON3VZ / WLD</div>
  <p>
    The live station × band matrix will appear here<br>
    once the field day starts.<br><br>
    The page updates automatically as contacts<br>
    are logged in N1MM Logger+.
  </p>
  <div class="url">https://on3vz.github.io/Field-Day-Tracker/</div>
  <div class="badge">🔄 Auto-refresh every 60 seconds</div>
</div>
</body>
</html>
